<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Population Optimizer</title>
<style>
  body { font-family: monospace; padding: 20px; }
  table { border-collapse: collapse; width: 100%; }
  th, td { border: 1px solid #ccc; padding: 6px 10px; text-align: left; }
  th { background: #f0f0f0; }
  td.computed { background: #f9f9f9; color: #555; }
  td.output { background: #e8f5e9; font-weight: bold; }
  input[type=number], input[type=text] { width: 100%; box-sizing: border-box; border: none; background: transparent; font-family: monospace; }
  .config { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
  .config label { display: block; font-size: 12px; margin-bottom: 4px; }
  .config input { border: 1px solid #ccc; padding: 4px 6px; width: 100%; box-sizing: border-box; font-family: monospace; }
  .status { margin: 8px 0; padding: 6px 10px; background: #e8f5e9; border: 1px solid #aaa; font-size: 13px; }
  .status.error { background: #fdecea; }
  button { margin-top: 10px; padding: 6px 14px; font-family: monospace; cursor: pointer; }
  .no-spin::-webkit-outer-spin-button,
  .no-spin::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .no-spin[type=number] { -moz-appearance: textfield; }
</style>
</head>
<body>

<h2>Population Optimizer</h2>

<div class="config">
  <div>
    <label>Total Population</label>
    <input type="number" id="totalPop" value="9000" min="0" step="1" class="no-spin"
    onkeydown="if(event.key==='ArrowUp'){event.preventDefault();this.value=+this.value+100;solve()}if(event.key==='ArrowDown'){event.preventDefault();this.value=Math.max(0,+this.value-100);solve()}">
  </div>
  <div>
    <label>Empire Growth Modifier (%)</label>
    <input type="number" id="empireGrowth" value="0" step="any">
  </div>
  <div>
    <label>Empire Housing Usage Modifier (%)</label>
    <input type="number" id="empireHousing" value="0" step="any">
  </div>
</div>

<div class="status" id="status">Ready</div>

<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Planet Capacity</th>
      <th>Planetary Growth Modifier (%)</th>
      <th>Effective Growth Modifier (%)</th>
      <th>Planetary Housing Usage Modifier (%)</th>
      <th>Housing Usage per Pop</th>
      <th>Population</th>
      <th>Current Base Growth</th>
      <th>Current Modified Growth</th>
      <th>Optimal Population</th>
      <th>Optimal Base Growth</th>
      <th>Optimal Modified Growth</th>
      <th></th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<button onclick="addRow()">+ Add Planet</button>
<button onclick="debugSolve()">Debug (check console)</button>
<button onclick="doExport()">Export</button>
<button onclick="toggleImport()">Import</button>

<div id="exportBox" style="display:none; margin-top:10px">
  <textarea id="exportText" rows="6" style="width:100%; font-family:monospace; font-size:12px" readonly></textarea>
</div>
<div id="importBox" style="display:none; margin-top:10px">
  <textarea id="importText" rows="6" style="width:100%; font-family:monospace; font-size:12px" placeholder="Paste exported JSON here..."></textarea>
  <button onclick="doImport()" style="margin-top:4px">Load</button>
</div>

<script>
let rows = [];
let rowId = 0;

function empireGrowth() { return parseFloat(document.getElementById('empireGrowth').value) || 0; }
function empireHousing() { return parseFloat(document.getElementById('empireHousing').value) || 0; }

// m = 1 + (empireGrowth% + planetGrowth%) / 100
function effectiveM(row) { return 1 + (empireGrowth() + row.growthMod) / 100; }
// h = 1 + (empireHousing% + planetHousing%) / 100
function effectiveH(row) { return 1 + (empireHousing() + row.housingMod) / 100; }

function addRow() {
  rows.push({ id: rowId++, name: '', c: 6000, growthMod: 0, housingMod: 0, pop: 3000 });
  renderTable();
  solve();
}

// Base growth (m=1): x * (1 - x / (c + x*(1-h))) / 400
function baseGrowth(x, c, h) {
  const denom = c + x * (1 - h);
  if (denom <= 0 || x <= 0) return 0;
  return x * (1 - x / denom) / 400;
}

// Modified growth = base * effective m
function modifiedGrowth(x, c, m, h) {
  return baseGrowth(x, c, h) * m;
}

function deleteRow(id) {
  rows = rows.filter(r => r.id !== id);
  renderTable();
  solve();
}

function updateRow(id, field, value) {
  const row = rows.find(r => r.id === id);
  if (!row) return;
  row[field] = field === 'name' ? value : (parseFloat(value) || 0);
  if (field === 'pop') {
    const total = rows.reduce((sum, r) => sum + r.pop, 0);
    document.getElementById('totalPop').value = total;
  }
  solve();
  const em = document.getElementById(`effM-${id}`);
  const eh = document.getElementById(`effH-${id}`);
  if (em) em.textContent = (effectiveM(row) * 100).toFixed(1) + '%';
  if (eh) eh.textContent = effectiveH(row).toFixed(3);
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  for (const row of rows) {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><input type="text" value="${row.name}" placeholder="Planet ${row.id + 1}"
        oninput="updateRow(${row.id}, 'name', this.value)"></td>
      <td><input type="number" value="${row.c}" min="0" step="1" class="no-spin"
        oninput="updateRow(${row.id}, 'c', this.value)"
        onkeydown="if(event.key==='ArrowUp'){event.preventDefault();this.value=+this.value+100;updateRow(${row.id},'c',this.value)}if(event.key==='ArrowDown'){event.preventDefault();this.value=Math.max(0,+this.value-100);updateRow(${row.id},'c',this.value)}"></td>
      <td><input type="number" value="${row.growthMod}" step="any"
        oninput="updateRow(${row.id}, 'growthMod', this.value)"> %</td>
      <td class="computed" id="effM-${row.id}">${(effectiveM(row)*100).toFixed(1)}%</td>
      <td><input type="number" value="${row.housingMod}" step="any"
        oninput="updateRow(${row.id}, 'housingMod', this.value)"> %</td>
      <td class="computed" id="effH-${row.id}">${effectiveH(row).toFixed(3)}</td>
      <td><input type="number" value="${row.pop}" min="0" step="1" class="no-spin"
        oninput="updateRow(${row.id}, 'pop', this.value)"
        onkeydown="if(event.key==='ArrowUp'){event.preventDefault();this.value=+this.value+100;updateRow(${row.id},'pop',this.value)}if(event.key==='ArrowDown'){event.preventDefault();this.value=Math.max(0,+this.value-100);updateRow(${row.id},'pop',this.value)}"></td>
      <td class="computed" id="curBG-${row.id}">—</td>
      <td class="computed" id="curMG-${row.id}">—</td>
      <td class="output" id="opt-${row.id}">—</td>
      <td class="computed" id="optBG-${row.id}">—</td>
      <td class="computed" id="optMG-${row.id}">—</td>
      <td><button onclick="deleteRow(${row.id})">×</button></td>
    `;
    tbody.appendChild(tr);
  }
  // totals row
  const tfoot = document.createElement('tr');
  tfoot.id = 'totalsRow';
  tfoot.style.fontWeight = 'bold';
  tfoot.style.background = '#f0f0f0';
  tfoot.innerHTML = `
    <td>Total</td>
    <td id="tot-c">—</td>
    <td></td>
    <td></td>
    <td></td>
    <td></td>
    <td id="tot-pop">—</td>
    <td id="tot-curBG">—</td>
    <td id="tot-curMG">—</td>
    <td id="tot-opt">—</td>
    <td id="tot-optBG">—</td>
    <td id="tot-optMG">—</td>
    <td></td>
  `;
  tbody.appendChild(tfoot);
}

// Growth = m * x * (1 - x / (c + x*(1-h))) / 400
// dG/dx = (m/400) * (1 - x*(2c + x*(1-h)) / (c + x*(1-h))^2)
// Setting dG/dx = lambda, with k = 400*lambda/m:
// (1-k)*(c + x*(1-h))^2 - x*(2c + x*(1-h)) = 0
// Quadratic in x:
//   a = (1-k)*(1-h)^2 - (1-h)
//   b = (1-k)*2c*(1-h) - 2c
//   c0 = (1-k)*c^2
function optimalX(c, m, h, lambda, log=false) {
  const k = lambda * 400 / m;
  const oh = 1 - h;
  const a  = (1 - k) * oh * oh - oh;
  const b  = (1 - k) * 2 * c * oh - 2 * c;
  const c0 = (1 - k) * c * c;

  if (log) console.log(`  optimalX(c=${c}, m=${m}, h=${h}, lambda=${lambda}): k=${k}, oh=${oh}, a=${a}, b=${b}, c0=${c0}`);

  if (Math.abs(a) < 1e-12) {
    const x = Math.abs(b) < 1e-12 ? 0 : Math.max(0, -c0 / b);
    if (log) console.log(`  -> linear case, x=${x}`);
    return x;
  }

  const disc = b * b - 4 * a * c0;
  if (log) console.log(`  disc=${disc}`);
  if (disc < 0) { if (log) console.log(`  -> disc<0, returning 0`); return 0; }
  const sq = Math.sqrt(disc);
  const x1 = (-b + sq) / (2 * a);
  const x2 = (-b - sq) / (2 * a);
  if (log) console.log(`  x1=${x1}, x2=${x2}`);

  const peak = unconstrainedPeak(c, h);
  if (log) console.log(`  unconstrainedPeak=${peak}`);
  const candidates = [x1, x2].filter(x => x >= -1e-9).map(x => Math.max(0, x));
  if (log) console.log(`  candidates=${candidates}`);
  if (candidates.length === 0) return 0;
  if (candidates.length === 1) return candidates[0];
  const result = candidates.reduce((best, x) => Math.abs(x - peak) < Math.abs(best - peak) ? x : best);
  if (log) console.log(`  -> result=${result}`);
  return result;
}

const VERSION = '0.0.18';
console.log(`Population Optimizer v${VERSION} initializing`);

function doExport() {
  const data = {
    totalPop: parseFloat(document.getElementById('totalPop').value) || 0,
    empireGrowth: parseFloat(document.getElementById('empireGrowth').value) || 0,
    empireHousing: parseFloat(document.getElementById('empireHousing').value) || 0,
    planets: rows.map(r => ({ name: r.name, c: r.c, growthMod: r.growthMod, housingMod: r.housingMod, pop: r.pop }))
  };
  const box = document.getElementById('exportBox');
  document.getElementById('exportText').value = JSON.stringify(data, null, 2);
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
}

function toggleImport() {
  const box = document.getElementById('importBox');
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
}

function doImport() {
  const text = document.getElementById('importText').value.trim();
  let data;
  try {
    data = JSON.parse(text);
  } catch(e) {
    alert('Invalid JSON: ' + e.message);
    return;
  }
  if (data.empireGrowth !== undefined) document.getElementById('empireGrowth').value = data.empireGrowth;
  if (data.empireHousing !== undefined) document.getElementById('empireHousing').value = data.empireHousing;
  if (Array.isArray(data.planets)) {
    rows = [];
    rowId = 0;
    for (const p of data.planets) {
      rows.push({ id: rowId++, name: p.name || '', c: p.c || 0, growthMod: p.growthMod || 0, housingMod: p.housingMod || 0, pop: p.pop || 0 });
    }
  }
  if (data.totalPop !== undefined) document.getElementById('totalPop').value = data.totalPop;
  document.getElementById('importBox').style.display = 'none';
  renderTable();
  solve();
}

function totalForLambda(lambda) {
  return rows.reduce((sum, r) => sum + xForLambda(r.c, effectiveM(r), effectiveH(r), lambda), 0);
}

function debugSolve() {
  console.log(`=== DEBUG SOLVE v${VERSION} ===`);
  console.log(`empireGrowth=${empireGrowth()}%, empireHousing=${empireHousing()}%`);
  for (const row of rows) {
    const m = effectiveM(row), h = effectiveH(row);
    console.log(`Row "${row.name || row.id}": c=${row.c}, growthMod=${row.growthMod}%, housingMod=${row.housingMod}%, m=${m}, h=${h}`);
    console.log(`  unconstrainedPeak = ${unconstrainedPeak(row.c, h)}`);
    console.log(`  xForLambda(0) = ${xForLambda(row.c, m, h, 0)}`);
  }
  console.log(`totalForLambda(0) = ${totalForLambda(0)}`);
  console.log(`totalForLambda(0.001) = ${totalForLambda(0.001)}`);
  console.log(`totalForLambda(-0.001) = ${totalForLambda(-0.001)}`);
  console.log('=== END DEBUG ===');
}

// Unconstrained peak: closed form c / (sqrt(h) * (1 + sqrt(h)))
function unconstrainedPeak(c, h) {
  if (h <= 0) return c / 2; // degenerate fallback
  const sh = Math.sqrt(h);
  return c / (sh * (1 + sh));
}

// d²G/dx² = -(m/400) * 2c² / q³  where q = c + x*(1-h)
function d2Gdx2(x, c, m, h) {
  const q = c + x * (1 - h);
  if (q <= 0) return -Infinity;
  return -(m / 400) * 2 * c * c / (q * q * q);
}

// dG/dx at a given x
function dGdx(x, c, m, h) {
  const q = c + x * (1 - h);
  if (q <= 0) return -Infinity;
  return (m / 400) * (1 - x * (2 * c + x * (1 - h)) / (q * q));
}

// Given lambda, solve dG/dx = lambda for x using the quadratic formula
// Returns x >= 0, or 0 if no valid solution
function xForLambda(c, m, h, lambda) {
  const k = lambda * 400 / m;
  const oh = 1 - h;
  const a  = (1 - k) * oh * oh - oh;
  const b  = (1 - k) * 2 * c * oh - 2 * c;
  const c0 = (1 - k) * c * c;

  if (Math.abs(a) < 1e-12) {
    return Math.abs(b) < 1e-12 ? 0 : Math.max(0, -c0 / b);
  }
  const disc = b * b - 4 * a * c0;
  if (disc < 0) return 0;
  const sq = Math.sqrt(disc);
  const x1 = (-b + sq) / (2 * a);
  const x2 = (-b - sq) / (2 * a);
  const peak = unconstrainedPeak(c, h);
  const candidates = [x1, x2].filter(x => x >= -1e-9).map(x => Math.max(0, x));
  if (candidates.length === 0) return 0;
  if (candidates.length === 1) return candidates[0];
  return candidates.reduce((best, x) => Math.abs(x - peak) < Math.abs(best - peak) ? x : best);
}

function solve() {
  // refresh computed cells
  for (const row of rows) {
    const em = document.getElementById(`effM-${row.id}`);
    const eh = document.getElementById(`effH-${row.id}`);
    if (em) em.textContent = (effectiveM(row) * 100).toFixed(1) + '%';
    if (eh) eh.textContent = effectiveH(row).toFixed(3);
  }
  updateCurrentGrowth();

  const p = parseFloat(document.getElementById('totalPop').value);
  if (rows.length === 0) { setStatus('Add planets to begin', false); clearOutputs(); return; }
  if (isNaN(p) || p < 0) { setStatus('Invalid total population', true); clearOutputs(); return; }

  // Newton's method on f(lambda) = sum(x_i(lambda)) - p
  // f'(lambda) = sum(dx_i/dlambda) = sum(1 / d2G_i/dx_i^2)
  // Starting point: lambda = dG/dx evaluated at equal share p/n
  const n = rows.length;
  const x0 = p / n;
  // estimate starting lambda as average marginal growth at equal share
  let lambda = rows.reduce((sum, r) => sum + dGdx(x0, r.c, effectiveM(r), effectiveH(r)), 0) / n;

  let converged = false;
  for (let iter = 0; iter < 100; iter++) {
    let f = -p;
    let df = 0;
    for (const row of rows) {
      const x = xForLambda(row.c, effectiveM(row), effectiveH(row), lambda);
      f += x;
      const d2 = d2Gdx2(x, row.c, effectiveM(row), effectiveH(row));
      // dx/dlambda = 1 / (d2G/dx2)
      if (d2 !== 0 && isFinite(d2)) df += 1 / d2;
    }
    if (Math.abs(f) < 0.001) { converged = true; break; }
    if (df === 0 || !isFinite(df)) break;
    lambda -= f / df;
  }

  let total = 0;
  for (const row of rows) {
    const x = xForLambda(row.c, effectiveM(row), effectiveH(row), lambda);
    setOutput(row.id, x);
    total += x;
  }

  const err = Math.abs(total - p);
  if (err > Math.max(p * 0.001, 1)) {
    setStatus(`Solver error: allocated ${total.toFixed(1)} vs target ${p.toFixed(1)}`, true);
  } else {
    setStatus(`Optimal distribution found (λ = ${lambda.toFixed(6)})`, false);
  }
}

function setOutput(id, x) {
  const row = rows.find(r => r.id === id);
  const optEl = document.getElementById(`opt-${id}`);
  const optBGEl = document.getElementById(`optBG-${id}`);
  const optMGEl = document.getElementById(`optMG-${id}`);
  if (optEl) optEl.textContent = x.toFixed(2);
  if (row) {
    const bg = baseGrowth(x, row.c, effectiveH(row));
    if (optBGEl) optBGEl.textContent = bg.toFixed(4);
    if (optMGEl) optMGEl.textContent = (bg * effectiveM(row)).toFixed(4);
  }
  updateTotals();
}

function updateCurrentGrowth() {
  for (const row of rows) {
    const bgEl = document.getElementById(`curBG-${row.id}`);
    const mgEl = document.getElementById(`curMG-${row.id}`);
    if (bgEl || mgEl) {
      const bg = baseGrowth(row.pop, row.c, effectiveH(row));
      if (bgEl) bgEl.textContent = bg.toFixed(4);
      if (mgEl) mgEl.textContent = (bg * effectiveM(row)).toFixed(4);
    }
  }
  updateTotals();
}

function updateTotals() {
  const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
  set('tot-c',     rows.reduce((s, r) => s + r.c, 0).toFixed(0));
  set('tot-pop',   rows.reduce((s, r) => s + r.pop, 0).toFixed(0));

  let curBG = 0, curMG = 0, optPop = 0, optBG = 0, optMG = 0;
  for (const row of rows) {
    const bg = baseGrowth(row.pop, row.c, effectiveH(row));
    curBG += bg;
    curMG += bg * effectiveM(row);

    const optEl = document.getElementById(`opt-${row.id}`);
    const ox = optEl ? parseFloat(optEl.textContent) : 0;
    if (!isNaN(ox)) {
      optPop += ox;
      const obg = baseGrowth(ox, row.c, effectiveH(row));
      optBG += obg;
      optMG += obg * effectiveM(row);
    }
  }
  set('tot-curBG', curBG.toFixed(4));
  set('tot-curMG', curMG.toFixed(4));
  set('tot-opt',   optPop.toFixed(2));
  set('tot-optBG', optBG.toFixed(4));
  set('tot-optMG', optMG.toFixed(4));
}

function clearOutputs() {
  for (const row of rows) {
    const el = document.getElementById(`opt-${row.id}`);
    if (el) el.textContent = '—';
  }
}

function setStatus(msg, isError) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (isError ? ' error' : '');
}

document.getElementById('totalPop').addEventListener('input', solve);
document.getElementById('empireGrowth').addEventListener('input', () => { renderTable(); solve(); });
document.getElementById('empireHousing').addEventListener('input', () => { renderTable(); solve(); });

// Seed
addRow();
rows[0].name = 'Planet 1'; rows[0].c = 6000;
addRow();
rows[1].name = 'Planet 2'; rows[1].c = 6000;
addRow();
rows[2].name = 'Planet 3'; rows[2].c = 6000;
document.getElementById('totalPop').value = rows.reduce((sum, r) => sum + r.pop, 0);
renderTable();
solve();
</script>
</body>
</html>
