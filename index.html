<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Stuff</title>
<style>
  :root {
    --bg: #0b0d12;
    --bg-elev: #151924;
    --bg-hover: #1d2230;
    --border: #2a3142;
    --border-hover: #4a5578;
    --text: #e6e8ee;
    --text-dim: #8b93a7;
    --accent: #7aa2ff;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "SF Mono", "JetBrains Mono", "Fira Code", Menlo, Consolas, "Courier New", monospace;
    min-height: 100vh;
  }
  body {
    background:
      radial-gradient(ellipse at top left, rgba(122, 162, 255, 0.08), transparent 60%),
      radial-gradient(ellipse at bottom left, rgba(180, 122, 255, 0.05), transparent 50%),
      var(--bg);
  }
  main {
    max-width: 640px;
    margin: 0;
    padding: 80px 24px 64px;
  }
  ul.links {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  ul.links li {
    margin: 0;
  }
  ul.links a {
    display: block;
    padding: 8px 18px;
    border-radius: 8px;
    color: var(--text);
    text-decoration: none;
    font-size: 1.05rem;
    transition: background 0.15s ease, color 0.15s ease;
  }
  ul.links a:hover {
    background: var(--bg-elev);
    color: var(--accent);
  }
  footer {
    margin-top: 64px;
    color: var(--text-dim);
    font-size: 0.85rem;
    text-align: center;
  }
  footer a {
    color: var(--text-dim);
    text-decoration: underline;
    text-decoration-color: var(--border);
  }
  footer a:hover { color: var(--text); }
</style>
</head>
<body>
<main>
  <ul class="links">
    <li><a href="planet_growth/">growth_optimizer</a></li>
    <li><a href="galactic_network/">galactic_network</a></li>
    <li><a href="priority_queue/">priority_queue</a></li>
    <li><a href="tech_extract/">tech_extract</a></li>
  </ul>
</main>
</body>
</html>
