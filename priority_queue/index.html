<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Priority Queue</title>
<style>
  :root {
    --bg: #1a1a1f;
    --panel: #24242c;
    --panel-2: #2d2d38;
    --border: #3a3a48;
    --text: #e6e6ee;
    --muted: #8a8a99;
    --accent: #6aa9ff;
    --accent-hover: #8cbbff;
    --danger: #e06868;
    --danger-hover: #ee8080;
    --done: #4a8a4a;
    --done-hover: #5fa55f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 24px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  h1 { margin: 0 0 16px; font-size: 22px; font-weight: 600; }
  h2 { margin: 24px 0 8px; font-size: 16px; font-weight: 600; color: var(--muted); }
  .container { max-width: 1100px; margin: 0 auto; }
  .list-wrap { display: flex; justify-content: flex-end; }

  .add-form {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    display: grid;
    grid-template-columns: 2fr 1fr 1.2fr auto;
    gap: 12px;
    align-items: end;
  }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 12px; color: var(--muted); }
  .field input {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 10px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    font-variant-numeric: tabular-nums;
  }
  .field input:focus { outline: none; border-color: var(--accent); }
  .field input.invalid { border-color: var(--danger); }

  button {
    background: var(--accent);
    color: #0a0a10;
    border: none;
    border-radius: 4px;
    padding: 8px 14px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  button:hover { background: var(--accent-hover); }
  button.danger { background: var(--danger); color: #fff; }
  button.danger:hover { background: var(--danger-hover); }
  button.done-btn { background: var(--done); color: #fff; }
  button.done-btn:hover { background: var(--done-hover); }
  button.unarchive-btn { background: var(--muted); color: #0a0a10; }
  button.unarchive-btn:hover { background: #a8a8b8; }

  .error {
    margin-top: 12px;
    color: var(--danger);
    font-size: 13px;
    min-height: 18px;
  }

  table {
    width: auto;
    border-collapse: collapse;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  th, td {
    padding: 3px 8px;
    text-align: right;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    line-height: 1.3;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  th {
    padding: 4px 8px;
    background: var(--panel-2);
    color: var(--muted);
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  tbody tr:last-child td { border-bottom: none; }
  td.actions { text-align: left; white-space: nowrap; padding: 2px 8px; }
  td.actions button { margin-left: 3px; padding: 1px 6px; font-size: 11px; }
  td.name { font-weight: 500; }
  td.event-date { color: #c8def5; font-weight: 600; }

  .archived tbody tr { opacity: 0.5; }
  .archived td.event-date { color: var(--muted); }
  .archived td.name { text-decoration: line-through; }

  .empty {
    padding: 16px;
    color: var(--muted);
    font-style: italic;
    text-align: center;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Priority Queue</h1>

  <form class="add-form" id="add-form" autocomplete="off">
    <div class="field">
      <label for="in-name">Name</label>
      <input id="in-name" type="text" placeholder="Event name" required>
    </div>
    <div class="field">
      <label for="in-days">Days to Event</label>
      <input id="in-days" type="text" placeholder="30" required>
    </div>
    <div class="field">
      <label for="in-entry">Entry Date (YYYY.MM.DD)</label>
      <input id="in-entry" type="text" placeholder="2450.06.15" required>
    </div>
    <button type="submit">Add</button>
  </form>
  <div class="error" id="error"></div>

  <h2>Active</h2>
  <div class="list-wrap" id="active-container"></div>

  <h2>Archived</h2>
  <div class="list-wrap" id="archived-container"></div>
</div>

<script>
(() => {
  const STORAGE_KEY = 'priority_queue_items_v1';
  const DAYS_PER_MONTH = 30;
  const MONTHS_PER_YEAR = 12;
  const DAYS_PER_YEAR = DAYS_PER_MONTH * MONTHS_PER_YEAR;

  // ---- Date helpers (custom 360-day calendar) ----
  // Date string: YYYY.MM.DD with year >= 0 (zero-padded to >=4), month 1..12, day 1..30.

  function parseDate(str) {
    if (typeof str !== 'string') throw new Error('Date must be a string');
    const m = str.match(/^(\d+)\.(\d{1,2})\.(\d{1,2})$/);
    if (!m) throw new Error('Date must be in YYYY.MM.DD format');
    const year = parseInt(m[1], 10);
    const month = parseInt(m[2], 10);
    const day = parseInt(m[3], 10);
    if (year < 0) throw new Error('Year must be >= 0');
    if (month < 1 || month > 12) throw new Error('Month must be between 01 and 12');
    if (day < 1 || day > 30) throw new Error('Day must be between 01 and 30');
    return { year, month, day };
  }

  function formatDate(d) {
    const yy = String(d.year).padStart(4, '0');
    const mm = String(d.month).padStart(2, '0');
    const dd = String(d.day).padStart(2, '0');
    return `${yy}.${mm}.${dd}`;
  }

  function dateToOrdinal(d) {
    return d.year * DAYS_PER_YEAR + (d.month - 1) * DAYS_PER_MONTH + (d.day - 1);
  }

  function ordinalToDate(n) {
    // n may be negative if entry date + negative days produces pre-year-0 date.
    // We allow that mathematically, but reject during input if year < 0.
    const year = Math.floor(n / DAYS_PER_YEAR);
    let rem = n - year * DAYS_PER_YEAR;
    const month = Math.floor(rem / DAYS_PER_MONTH) + 1;
    const day = (rem % DAYS_PER_MONTH) + 1;
    return { year, month, day };
  }

  function addDays(d, days) {
    return ordinalToDate(dateToOrdinal(d) + days);
  }

  function parseDays(str) {
    if (typeof str !== 'string') throw new Error('Days must be a string');
    const trimmed = str.trim();
    if (!/^-?\d+$/.test(trimmed)) throw new Error('Days to event must be an integer');
    return parseInt(trimmed, 10);
  }

  // ---- Storage ----
  let items = [];

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) { items = []; return; }
      const parsed = JSON.parse(raw);
      if (!Array.isArray(parsed)) { items = []; return; }
      items = parsed.filter(it => it && typeof it.id === 'string');
    } catch {
      items = [];
    }
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
  }

  function genId() {
    if (crypto && typeof crypto.randomUUID === 'function') return crypto.randomUUID();
    return 'id-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 10);
  }

  // ---- Item operations ----
  function addItem(name, entryStr, daysStr) {
    const entry = parseDate(entryStr);
    const days = parseDays(daysStr);
    const event = addDays(entry, days);
    if (event.year < 0) throw new Error('Computed event year is negative');
    const item = {
      id: genId(),
      name: name.trim(),
      entryDate: formatDate(entry),
      daysToEvent: days,
      eventDate: formatDate(event),
      eventOrdinal: dateToOrdinal(event),
      done: false,
    };
    items.push(item);
    save();
    render();
  }

  function setDone(id, done) {
    const it = items.find(x => x.id === id);
    if (!it) return;
    it.done = done;
    if (done) {
      entryInput.value = it.eventDate;
      nameInput.value = it.name;
    }
    save();
    render();
  }

  function deleteItem(id) {
    items = items.filter(x => x.id !== id);
    save();
    render();
  }

  // ---- Rendering ----
  function render() {
    const active = items.filter(it => !it.done).sort(byEvent);
    const archived = items.filter(it => it.done).sort((a, b) => -byEvent(a, b));
    renderTable(document.getElementById('active-container'), active, false);
    renderTable(document.getElementById('archived-container'), archived, true);
  }

  function byEvent(a, b) {
    if (a.eventOrdinal !== b.eventOrdinal) return a.eventOrdinal - b.eventOrdinal;
    return a.name.localeCompare(b.name);
  }

  function renderTable(container, list, archived) {
    container.innerHTML = '';
    if (list.length === 0) {
      const div = document.createElement('div');
      div.className = 'empty';
      div.textContent = archived ? 'No archived events.' : 'No active events.';
      container.appendChild(div);
      return;
    }
    const table = document.createElement('table');
    if (archived) table.className = 'archived';
    table.innerHTML = `
      <thead>
        <tr>
          <th></th>
          <th>Entry Date</th>
          <th>Days to Event</th>
          <th>Name</th>
          <th>Event Date</th>
        </tr>
      </thead>
      <tbody></tbody>
    `;
    const tbody = table.querySelector('tbody');
    for (const it of list) {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="actions"></td>
        <td></td>
        <td></td>
        <td class="name"></td>
        <td class="event-date"></td>
      `;
      tr.children[1].textContent = it.entryDate;
      tr.children[2].textContent = it.daysToEvent;
      tr.children[3].textContent = it.name;
      tr.children[4].textContent = it.eventDate;

      const actions = tr.children[0];
      if (archived) {
        const unarchiveBtn = document.createElement('button');
        unarchiveBtn.className = 'unarchive-btn';
        unarchiveBtn.textContent = 'Unarchive';
        unarchiveBtn.addEventListener('click', () => setDone(it.id, false));
        actions.appendChild(unarchiveBtn);
      } else {
        const doneBtn = document.createElement('button');
        doneBtn.className = 'done-btn';
        doneBtn.textContent = 'Done';
        doneBtn.addEventListener('click', () => setDone(it.id, true));
        actions.appendChild(doneBtn);
      }
      const delBtn = document.createElement('button');
      delBtn.className = 'danger';
      delBtn.textContent = 'Delete';
      delBtn.addEventListener('click', () => deleteItem(it.id));
      actions.appendChild(delBtn);

      tbody.appendChild(tr);
    }
    container.appendChild(table);
  }

  // ---- Form ----
  const form = document.getElementById('add-form');
  const errorEl = document.getElementById('error');
  const nameInput = document.getElementById('in-name');
  const entryInput = document.getElementById('in-entry');
  const daysInput = document.getElementById('in-days');

  function clearInvalid() {
    [nameInput, entryInput, daysInput].forEach(el => el.classList.remove('invalid'));
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    errorEl.textContent = '';
    clearInvalid();
    const name = nameInput.value.trim();
    if (!name) {
      nameInput.classList.add('invalid');
      errorEl.textContent = 'Name is required.';
      return;
    }
    try {
      addItem(name, entryInput.value, daysInput.value);
      const lastEntry = entryInput.value;
      form.reset();
      entryInput.value = lastEntry; // keep entry date for quick repeated entry
      nameInput.focus();
    } catch (err) {
      errorEl.textContent = err.message;
      if (/date/i.test(err.message) || /year/i.test(err.message) || /month/i.test(err.message) || /day/i.test(err.message)) {
        if (/Days to event/i.test(err.message) || /^Days/.test(err.message)) {
          daysInput.classList.add('invalid');
        } else {
          entryInput.classList.add('invalid');
        }
      } else {
        daysInput.classList.add('invalid');
      }
    }
  });

  // ---- Init ----
  load();
  // Backfill eventOrdinal in case of older data shape.
  let dirty = false;
  for (const it of items) {
    if (typeof it.eventOrdinal !== 'number') {
      try {
        it.eventOrdinal = dateToOrdinal(parseDate(it.eventDate));
        dirty = true;
      } catch {}
    }
  }
  if (dirty) save();
  render();
})();
</script>
</body>
</html>
